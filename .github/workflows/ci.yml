name: CI - Iac Validation

on:
  push:
    branches: ["**"]
    paths:
      - "infra/**"
      - "ansible/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/ci-versions.env"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "ansible/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/ci-versions.env"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{steps.filter.outputs.infra}}
      ansible: ${{steps.filter.outputs.ansible}}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/ci-versions.env'
            ansible:
              - 'ansible/**'
              - '.github/workflows/ci-versions.env'
  versions:
    name: Load CI Versions
    runs-on: ubuntu-latest
    outputs:
      terraform_version: ${{steps.versions.outputs.terraform_version}}
      tflint_version: ${{ steps.versions.outputs.tflint_version }}
      tfsec_version: ${{ steps.versions.outputs.tfsec_version }}
      python_version: ${{ steps.versions.outputs.python_version }}
      ansible_version: ${{ steps.versions.outputs.ansible_version }}
      ansible_lint_version: ${{ steps.versions.outputs.ansible_lint_version }}
      yamllint_version: ${{ steps.versions.outputs.yamllint_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Versions File
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          source .github/workflows/ci-versions.env
          {
            echo "terraform_version=${TERRAFORM_VERSION}"
            echo "tflint_version=${TFLINT_VERSION}"
            echo "tfsec_version=${TFSEC_VERSION}"
            echo "python_version=${PYTHON_VERSION}"
            echo "ansible_version=${ANSIBLE_VERSION}"
            echo "ansible_lint_version=${ANSIBLE_LINT_VERSION}"
            echo "yamllint_version=${YAMLLINT_VERSION}"
          } >> "$GITHUB_OUTPUT"
  terraform:
    needs: [changes, versions]
    if: ${{needs.changes.outputs.infra == 'true'}}
    name: Terraform Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{needs.versions.outputs.terraform_version}}

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{needs.versions.outputs.tflint_version}}

      - name: Run TFLint
        run: tflint --recursive

      - name: Install tfsec
        shell: bash
        env:
          TFSEC_VERSION: ${{needs.versions.outputs.tfsec_version}}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          curl -sSfL "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64" -o "${HOME}/.local/bin/tfsec"
          chmod +x "${HOME}/.local/bin/tfsec"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
          tfsec --version

      - name: Run TFSec (Security)
        run: tfsec .

  ansible:
    needs: [changes, versions]
    if: ${{needs.changes.outputs.ansible == 'true'}}
    name: Ansible Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{needs.versions.outputs.python_version}}

      - name: Install Ansible and Lint Tools
        shell: bash
        env:
          ANSIBLE_VERSION: ${{needs.versions.outputs.ansible_version}}
          ANSIBLE_LINT_VERSION: ${{needs.versions.outputs.ansible_lint_version}}
          YAMLLINT_VERSION: ${{needs.versions.outputs.yamllint_version}}
        run: |
          pip install \
            "ansible==${ANSIBLE_VERSION}" \
            "ansible-lint==${ANSIBLE_LINT_VERSION}" \
            "yamllint==${YAMLLINT_VERSION}"

      - name: Run YAML Lint
        run: yamllint .

      - name: Run Ansible Lint
        run: ansible-lint .
